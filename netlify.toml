# Netlify config for the MatchupCoach STATIC frontend.
# Netlify can't run server.js (the Node API), so we PROXY every /api/* request
# to the Render backend. The browser still calls same-origin /api (api-client.js
# uses BASE = '/api'), so accounts + Google sign-in work with no CORS changes.
#
# IMPORTANT: replace the host below with YOUR actual Render service URL
# (Render dashboard → your "matchupcoach" service → the .onrender.com URL).

[build]
  publish = "."

# ALWAYS-FRESH CACHING: the app is one big HTML file + hundreds of champ-data
# scripts with no version query. Without explicit headers, browsers heuristically
# cache them for days — users kept seeing old builds after deploys ("the fix
# didn't work"). max-age=0 + must-revalidate forces a cheap ETag check on every
# load, so each deploy reaches everyone immediately (304s when nothing changed).
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Proxy the API to the Render backend (200 = rewrite/proxy, not a redirect).
[[redirects]]
  from = "/api/*"
  to = "https://matchupcoach.onrender.com/api/:splat"
  status = 200
  force = true

# Serve the app at the root URL (skip the index.html meta-refresh hop).
[[redirects]]
  from = "/"
  to = "/MatchupCoach.dc.html"
  status = 200

# Matchup deep links (/matchup/a-vs-b and /matchup/leagueoflegends/lol/a-vs-b)
# load the app, which reads the path and opens that matchup (_openFromUrl).
# Without this every shared/sitemap matchup URL 404'd on Netlify — only the
# Node server had the SPA fallback. Static files under /matchup/ still win
# (Netlify only applies a non-forced redirect when no file matches).
[[redirects]]
  from = "/matchup/*"
  to = "/MatchupCoach.dc.html"
  status = 200

# Don't serve backend-only files even though they live in the repo root.
[[redirects]]
  from = "/server.js"
  to = "/MatchupCoach.dc.html"
  status = 404
[[redirects]]
  from = "/render.yaml"
  to = "/MatchupCoach.dc.html"
  status = 404
[[redirects]]
  from = "/server-data/*"
  to = "/MatchupCoach.dc.html"
  status = 404
