# Render blueprint — creates the MatchupCoach web service from this repo.
# In Render: New + > Blueprint > pick this repo, and it reads this file.
# The starter plan + 1GB disk (~$7.25/mo total) is required so accounts and
# the founder counter PERSIST — free instances wipe their disk on every
# restart/deploy, which would reset all users.
services:
  - type: web
    name: matchupcoach
    runtime: node
    plan: starter
    startCommand: node server.js
    healthCheckPath: /api/health
    disk:
      name: matchupcoach-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PAYMENTS_MODE
        value: "off"  # paid checkout disabled until Stripe is wired; flip to "demo" for testing
      - key: GOOGLE_CLIENT_ID
        # Public OAuth web-client id (Google Cloud project "MatchupCoach") —
        # safe to commit; the client SECRET is never used or stored anywhere.
        value: "993471719983-g8fkkrqom5ap0f7pdf7tkg63v86d77l4.apps.googleusercontent.com"
      # --- Stripe (real payments). Add these in the Render dashboard, NOT here
      #     (the secret key must never be committed to git). When STRIPE_SECRET_KEY
      #     is set, the paid tiers switch from "Coming soon" to live Stripe Checkout.
      - key: STRIPE_SECRET_KEY
        sync: false            # set in Render dashboard: sk_live_… (or sk_test_… to trial)
      - key: STRIPE_PRICE_ALL
        sync: false            # Stripe Price ID for All Access $9.99/mo (price_…)
      - key: STRIPE_PRICE_ROLE
        sync: false            # Stripe Price ID for Lane Pass $4.99/mo (price_…)
      - key: PUBLIC_URL
        value: "https://matchupcoach.gg"
