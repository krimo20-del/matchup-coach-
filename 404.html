<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — MatchupCoach.gg</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0d0f16">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root { --bg:#0d0f16; --card:#11131c; --gold:#e8b84b; --green:#3ddc97; --ink:#f4efe8; --mut:#8a90a2; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 600px at 50% -10%,rgba(61,220,151,0.08),transparent 60%),var(--bg);
    color:var(--ink);font-family:'Manrope',system-ui,-apple-system,'Segoe UI',sans-serif;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .wrap{max-width:520px}
  .mark{width:64px;height:64px;border-radius:16px;background:linear-gradient(180deg,#f0cd72,var(--gold));
    margin:0 auto 22px;position:relative}
  .mark::after{content:"";position:absolute;left:14px;top:15px;border-left:18px solid transparent;
    border-right:18px solid transparent;border-bottom:30px solid #1c1206}
  h1{font-family:'Chakra Petch','Segoe UI',sans-serif;font-weight:800;font-size:80px;margin:0;letter-spacing:1px;
    background:linear-gradient(180deg,#fff,#b9bdca);-webkit-background-clip:text;background-clip:text;color:transparent}
  h2{font-family:'Chakra Petch','Segoe UI',sans-serif;font-weight:700;font-size:22px;margin:6px 0 10px}
  p{color:var(--mut);font-size:15px;line-height:1.5;margin:0 0 24px}
  a.btn{display:inline-block;text-decoration:none;padding:13px 22px;border-radius:12px;
    background:linear-gradient(180deg,#7fe3b8,var(--green));color:#06281a;font-weight:800;font-size:14px;
    font-family:'Chakra Petch','Segoe UI',sans-serif;letter-spacing:0.3px}
  a.btn:hover{filter:brightness(1.05)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark"></div>
    <h1>404</h1>
    <h2>That lane doesn't exist.</h2>
    <p>The matchup or page you're looking for moved or was never here. Head back to the loading screen and pick your lane.</p>
    <a class="btn" href="/">← Back to MatchupCoach</a>
  </div>
</body>
</html>
