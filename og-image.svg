<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11131c"/>
      <stop offset="0.55" stop-color="#0d0f16"/>
      <stop offset="1" stop-color="#0a0c12"/>
    </linearGradient>
    <radialGradient id="glowG" cx="0.18" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#3ddc97" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3ddc97" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.9" cy="0.9" r="0.5">
      <stop offset="0" stop-color="#ff5d6c" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff5d6c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowG)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <rect x="6" y="6" width="1188" height="618" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- logo mark -->
  <g transform="translate(96,92)">
    <rect width="64" height="64" rx="16" fill="#e8b84b"/>
    <path d="M14 44 L32 16 L50 44 Z" fill="#1c1206"/>
  </g>
  <text x="180" y="124" font-size="34" font-weight="800" letter-spacing="0.5">
    <tspan fill="#f4efe8">MatchupCoach</tspan><tspan fill="#e8b84b">.gg</tspan>
  </text>
  <text x="180" y="150" font-size="15" font-weight="700" letter-spacing="4" fill="#7d8499">LOADING-SCREEN COACH</text>

  <!-- headline -->
  <text x="96" y="300" font-size="78" font-weight="800" fill="#f4efe8">Stop guessing</text>
  <text x="96" y="392" font-size="78" font-weight="800" fill="#f4efe8">your matchups. <tspan fill="#3ddc97">Win.</tspan></text>

  <!-- subhead -->
  <text x="100" y="462" font-size="27" fill="#aab0c2">Power spikes · cooldown timers · wave plans · build paths —</text>
  <text x="100" y="500" font-size="27" fill="#aab0c2">every champion, every lane, every matchup.</text>

  <!-- chips -->
  <g transform="translate(96,548)" font-size="20" font-weight="700">
    <g>
      <rect width="220" height="46" rx="12" fill="#3ddc97" fill-opacity="0.12" stroke="#3ddc97" stroke-opacity="0.4"/>
      <text x="110" y="30" text-anchor="middle" fill="#7fe3b8">11,600+ matchups</text>
    </g>
    <g transform="translate(240,0)">
      <rect width="250" height="46" rx="12" fill="#46c6f5" fill-opacity="0.12" stroke="#46c6f5" stroke-opacity="0.4"/>
      <text x="125" y="30" text-anchor="middle" fill="#8fd6f5">enemy jungle tracker</text>
    </g>
    <g transform="translate(510,0)">
      <rect width="210" height="46" rx="12" fill="#e8b84b" fill-opacity="0.12" stroke="#e8b84b" stroke-opacity="0.4"/>
      <text x="105" y="30" text-anchor="middle" fill="#f0cd72">all 5 roles live</text>
    </g>
  </g>

  <!-- VS emblem (top-right corner, clear of the headline) -->
  <g transform="translate(1040,150)">
    <circle r="110" fill="#0c0e15" stroke="#e8b84b" stroke-opacity="0.5" stroke-width="3"/>
    <circle r="110" fill="#3ddc97" fill-opacity="0.05"/>
    <text y="26" text-anchor="middle" font-size="74" font-weight="800" fill="#f0cd72">VS</text>
  </g>
</svg>
