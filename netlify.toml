# Netlify config for the MatchupCoach STATIC frontend.
# Netlify can't run server.js (the Node API), so we PROXY every /api/* request
# to the Render backend. The browser still calls same-origin /api (api-client.js
# uses BASE = '/api'), so accounts + Google sign-in work with no CORS changes.
#
# IMPORTANT: replace the host below with YOUR actual Render service URL
# (Render dashboard → your "matchupcoach" service → the .onrender.com URL).

[build]
  publish = "."

# Proxy the API to the Render backend (200 = rewrite/proxy, not a redirect).
[[redirects]]
  from = "/api/*"
  to = "https://matchupcoach.onrender.com/api/:splat"
  status = 200
  force = true

# Serve the app at the root URL (skip the index.html meta-refresh hop).
[[redirects]]
  from = "/"
  to = "/MatchupCoach.dc.html"
  status = 200

# Don't serve backend-only files even though they live in the repo root.
[[redirects]]
  from = "/server.js"
  to = "/MatchupCoach.dc.html"
  status = 404
[[redirects]]
  from = "/render.yaml"
  to = "/MatchupCoach.dc.html"
  status = 404
[[redirects]]
  from = "/server-data/*"
  to = "/MatchupCoach.dc.html"
  status = 404
